apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
    # Pod Security Standards
    # enforce=privileged: local-path-provisioner helper pods need hostPath.
    # Actual pod security is enforced by Gatekeeper constraints (deny mode).
    # warn/audit=restricted: flags non-compliant pods in logs/warnings.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
