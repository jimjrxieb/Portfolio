# Hardened Application Deployment — FedRAMP AC-6, CM-6, SI-2
# Replace {{NAMESPACE}}, {{APP_NAME}}, {{APP_IMAGE}}, {{APP_PORT}},
# {{DB_NAME}}, {{DB_IMAGE}}, {{DB_PORT}}, {{RUN_AS_USER}}, {{RUN_AS_GROUP}}
# with client-specific values.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{APP_NAME}}"
  namespace: "{{NAMESPACE}}"
  labels:
    app: "{{APP_NAME}}"
    fedramp-control: AC-6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{APP_NAME}}"
  template:
    metadata:
      labels:
        app: "{{APP_NAME}}"
    spec:
      serviceAccountName: "{{APP_NAME}}-sa"
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: "{{RUN_AS_USER}}"
        runAsGroup: "{{RUN_AS_GROUP}}"
        fsGroup: "{{RUN_AS_GROUP}}"
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: "{{APP_NAME}}"
          image: "{{APP_IMAGE}}"
          ports:
            - containerPort: "{{APP_PORT}}"
              protocol: TCP
          env:
            - name: DB_HOST
              value: "{{DB_NAME}}"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: "{{APP_NAME}}-db-credentials"
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{APP_NAME}}-db-credentials"
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: "{{APP_PORT}}"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: "{{APP_PORT}}"
            initialDelaySeconds: 30
            periodSeconds: 30
---
# Database Deployment (if applicable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{DB_NAME}}"
  namespace: "{{NAMESPACE}}"
  labels:
    app: "{{DB_NAME}}"
    fedramp-control: AC-6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{DB_NAME}}"
  template:
    metadata:
      labels:
        app: "{{DB_NAME}}"
    spec:
      serviceAccountName: "{{APP_NAME}}-sa"
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: "{{DB_NAME}}"
          image: "{{DB_IMAGE}}"
          ports:
            - containerPort: "{{DB_PORT}}"
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{APP_NAME}}-db-credentials"
                  key: root-password
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: "{{APP_NAME}}-db-credentials"
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{APP_NAME}}-db-credentials"
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "{{DB_NAME}}-data"
---
# Database credentials (replace with sealed-secrets or external secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: "{{APP_NAME}}-db-credentials"
  namespace: "{{NAMESPACE}}"
  labels:
    fedramp-control: IA-5
type: Opaque
stringData:
  root-password: "CHANGE-ME-root-password"
  username: "CHANGE-ME-username"
  password: "CHANGE-ME-password"
---
# PVC for database data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{DB_NAME}}-data"
  namespace: "{{NAMESPACE}}"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
