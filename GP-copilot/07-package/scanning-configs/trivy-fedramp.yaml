# Trivy Configuration — FedRAMP SI-2 Container Scanning
# Maps to: SI-2 (Flaw Remediation), CM-8 (Component Inventory)
#
# Usage: trivy fs --config trivy-fedramp.yaml {{TARGET_DIR}}/
# Replace {{TARGET_DIR}} with the client application directory.

severity:
  - CRITICAL
  - HIGH
  - MEDIUM

scan:
  # Scan container images for OS and library vulnerabilities
  security-checks:
    - vuln
    - misconfig
    - secret

  # Target the client application directory
  # Replace {{TARGET_DIR}} with the actual path
  target: "{{TARGET_DIR}}/"

  # Skip directories not relevant to security scanning
  skip-dirs:
    - "{{TARGET_DIR}}/docs"
    - "{{TARGET_DIR}}/tests"
    - evidence
    - demo

vulnerability:
  # Include unfixed vulnerabilities for complete audit trail
  ignore-unfixed: false

  # Vulnerability types to scan
  type:
    - os
    - library

misconfig:
  # Check Dockerfiles and Kubernetes manifests
  include:
    - dockerfile
    - kubernetes

  # Policy paths for custom checks
  policy:
    - policies/conftest

output:
  # Format for CI integration
  format: json

  # Output path (override with --output flag in CI)
  output: "evidence/scan-reports/trivy-latest.json"

# SBOM generation for CM-8 compliance
sbom:
  format: cyclonedx
  output: "evidence/scan-reports/sbom-latest.json"
