# helm-values-prod.yaml
# Production environment Helm values template — maximum security, HA, autoscaling.
# Security context is IDENTICAL to staging. Differences: replicas, HPA, PDB, pullPolicy.
#
# Copy to <client-repo>/helm/values-prod.yaml and customize.
#
# Generated by: GP-CONSULTING/06-CLOUD-SECURITY/tools/deploy-prod.sh --generate-values
# Playbook:     GP-CONSULTING/06-CLOUD-SECURITY/playbooks/08-deploy-prod.md

# ── Application ──────────────────────────────────────────────────────────────
replicaCount: 3

image:
  repository: "<account-id>.dkr.ecr.us-east-1.amazonaws.com/your-app"
  tag: "v1.0.0"          # Exact semver promoted from staging — NEVER :latest
  pullPolicy: IfNotPresent  # Don't re-pull on restart — image is immutable

imagePullSecrets: []
# - name: ecr-cred      # Only if NOT using IRSA for ECR pull

nameOverride: ""
fullnameOverride: ""

# ── Service Account (IRSA) ───────────────────────────────────────────────────
serviceAccount:
  create: true
  automount: false
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/<app-name>-prod-role"
  name: ""

# ── Security Context (Pod-level) — IDENTICAL to staging ──────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# ── Security Context (Container-level) — IDENTICAL to staging ────────────────
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# ── Resources (Prod class — same as staging) ─────────────────────────────────
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# ── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ── Container ────────────────────────────────────────────────────────────────
containerPort: 8080

# ── Health Probes ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

# ── Volumes (for readOnlyRootFilesystem) ─────────────────────────────────────
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /var/cache

volumes:
  - name: tmp
    emptyDir:
      sizeLimit: 100Mi
  - name: cache
    emptyDir:
      sizeLimit: 200Mi

# ── Ingress (ALB on EKS) ────────────────────────────────────────────────────
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:<account-id>:certificate/<cert-id>"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # WAF integration (uncomment if WAF ACL exists)
    # alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:us-east-1:<account-id>:regional/webacl/<name>/<id>"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: prod-tls
      hosts:
        - app.example.com

# ── Autoscaling (HPA — enabled in prod) ─────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Pod Disruption Budget ────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ── Network Policy ───────────────────────────────────────────────────────────
networkPolicy:
  enabled: true
  ingress:
    # Allow ALB health checks
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: aws-load-balancer-controller
      ports:
        - port: 8080
          protocol: TCP
    # Allow same-namespace traffic
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Same-namespace
    - to:
        - podSelector: {}
    # AWS services (HTTPS — for IRSA, Secrets Manager, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP

# ── Node Scheduling ──────────────────────────────────────────────────────────
nodeSelector: {}
  # kubernetes.io/arch: amd64    # Pin architecture if mixed node groups

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - your-app
          topologyKey: kubernetes.io/hostname

# ── Topology Spread ──────────────────────────────────────────────────────────
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: your-app

# ── Environment Variables ────────────────────────────────────────────────────
env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "warn"

envFrom: []
# - secretRef:
#     name: app-secrets-prod     # From Secrets Manager via ESO or manual
# - configMapRef:
#     name: app-config-prod

# ── Pod Annotations ──────────────────────────────────────────────────────────
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

# ── Deployment Strategy ──────────────────────────────────────────────────────
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0    # Zero-downtime deploys
    maxSurge: 1
