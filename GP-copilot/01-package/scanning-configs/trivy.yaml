# Trivy Configuration — Portfolio
# Container + filesystem vulnerability scanner
# Docs: https://aquasecurity.github.io/trivy/

scan:
  security-checks:
    - vuln          # CVEs in OS packages and language deps
    - config        # IaC misconfigurations
    - secret        # Secrets and credentials
    - license       # License compliance

  skip-dirs:
    - node_modules
    - vendor
    - venv
    - .venv
    - .git
    - tests
    - dist
    - build
    - data/chroma
    - rag-pipeline/04-processed-rag-data

vulnerability:
  severity:
    - CRITICAL
    - HIGH
    - MEDIUM
  type:
    - os
    - library
  ignore-unfixed: false

misconfiguration:
  severity:
    - CRITICAL
    - HIGH
    - MEDIUM
  compliance:
    - docker-cis
    - k8s-cis
    - k8s-pss-baseline

secret:
  config: .gitleaks.toml

license:
  forbidden:
    - GPL-2.0
    - GPL-3.0
    - AGPL-1.0
    - AGPL-3.0

format: json
exit-code: 1
timeout: 5m0s
ignorefile: .trivyignore

sbom:
  format: cyclonedx-json
