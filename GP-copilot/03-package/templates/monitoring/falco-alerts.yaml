# Falco integration PrometheusRule alerts
# Monitors Falco runtime threat detection health and alert patterns
#
# Apply with:
#   kubectl apply -f falco-alerts.yaml
#
# Requires: prometheus-operator (kube-prometheus-stack) and falco-exporter installed
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: falco-integration-alerts
  namespace: monitoring
  labels:
    app: jsa-infrasec
    role: alert-rules
    prometheus: kube-prometheus
spec:
  groups:
    - name: falco-integration
      rules:
        - alert: FalcoSilent
          expr: rate(falco_alerts_total[5m]) == 0
          for: 10m
          labels:
            severity: warning
            team: security
          annotations:
            summary: "No Falco alerts received"
            description: "Falco has not generated any alerts in 10 minutes. This may indicate Falco is down, misconfigured, or the exporter pipeline is broken. Verify falco pods and falco-exporter."
            runbook_url: "https://wiki.internal/runbooks/falco/silent"

        - alert: CriticalMITRETactic
          expr: |
            sum by (mitre_tactic) (
              increase(falco_alerts_total{
                mitre_tactic=~"Exfiltration|Impact|Command and Control"
              }[5m])
            ) > 0
          labels:
            severity: critical
            team: security
          annotations:
            summary: "Critical MITRE tactic detected: {{ $labels.mitre_tactic }}"
            description: "Falco detected activity mapped to MITRE ATT&CK tactic '{{ $labels.mitre_tactic }}'. This indicates a potential active attack. Escalate to S-rank for immediate human response."
            runbook_url: "https://wiki.internal/runbooks/falco/critical-mitre-tactic"

        - alert: FalcoPodNotRunning
          expr: |
            kube_daemonset_status_number_ready{daemonset="falco"}
            < kube_daemonset_status_desired_number_scheduled{daemonset="falco"}
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Falco DaemonSet pods not running on all nodes"
            description: "{{ $value }} Falco pods are missing compared to desired count. Nodes without Falco have no runtime threat detection. Check node taints, resource limits, and pod events."
            runbook_url: "https://wiki.internal/runbooks/falco/pod-not-running"

        - alert: FalcoHighAlertRate
          expr: sum(rate(falco_alerts_total[1h])) * 3600 > 1000
          for: 15m
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Falco generating more than 1000 alerts/hr"
            description: "Alert rate is {{ $value | humanize }}/hr. This volume may indicate noisy rules, a misconfigured workload, or an active attack. Review top triggering rules and tune thresholds."
            runbook_url: "https://wiki.internal/runbooks/falco/high-alert-rate"

        - alert: FalcoRulesNotLoaded
          expr: |
            absent(kube_configmap_info{configmap="falco-custom-rules", namespace="gp-security"})
          for: 10m
          labels:
            severity: warning
            team: security
          annotations:
            summary: "Falco custom rules ConfigMap missing"
            description: "The falco-custom-rules ConfigMap is not present in the gp-security namespace. Falco is running with default rules only, which may miss organization-specific threats."
            runbook_url: "https://wiki.internal/runbooks/falco/rules-not-loaded"
