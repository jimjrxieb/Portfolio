# jsa-infrasec Helm Values - Azure AKS Production
# Comprehensive runtime security for Azure AKS clusters
#
# Prerequisites:
#   - AKS cluster with workload identity enabled
#   - Managed identity with:
#     - Storage Blob Data Contributor (for snapshots)
#     - Monitoring Contributor (for Azure Monitor)
#     - Reader (for resource monitoring)
#   - Azure Blob Storage container for snapshots
#
# Usage:
#   cp deployment-configs/azure-aks.yaml my-values.yaml
#   # Edit CHANGE ME values
#   helm install jsa-infrasec gp-copilot/jsa-infrasec -n gp-security -f my-values.yaml

# Global settings
nameOverride: "jsa-infrasec"
fullnameOverride: "jsa-infrasec"

# Image configuration
image:
  repository: gp-copilot/jsa-infrasec
  tag: "latest"
  pullPolicy: IfNotPresent

# Replica count
replicaCount: 2

# Resource limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# JADE integration
jade:
  enabled: true
  url: "http://jade.gp-security:5000"
  rankCeiling: "C"  # JADE's maximum authority (hardcoded, never raise)
  timeout: 300
  retries: 3

# Watchers configuration
watchers:
  # Falco syscall monitoring
  falco:
    enabled: true
    endpoint: "http://falco.falco:5000"
    rules:
      - mitre-attack
      - k8s-audit
      - container-activity
    mitre:
      enabled: true
      enrichment: true

  # Kubernetes watchers
  kubernetes:
    events:
      enabled: true
      types: ["Warning", "Error"]
    audit:
      enabled: true
      logPath: "/var/log/kubernetes/audit.log"
    drift:
      enabled: true
      interval: 60
    admission:
      enabled: true
      deniedOnly: true
    logs:
      enabled: true
      anomalyDetection: true

  # Policy watchers
  policy:
    gatekeeper:
      enabled: true
      prometheus: true
    kyverno:
      enabled: true
      policyReports: true
    conftest:
      enabled: false

  # IaC watchers
  iac:
    terraform:
      enabled: false
    helm:
      enabled: true
      releases: ["all"]

  # Azure Cloud watchers
  cloud:
    aws:
      enabled: false
    azure:
      enabled: true
      subscriptionId: "00000000-0000-0000-0000-000000000000"  # CHANGE ME
      resourceGroup: "my-aks-rg"  # CHANGE ME
      tenantId: "00000000-0000-0000-0000-000000000000"  # CHANGE ME
      watchers:
        rbac:
          enabled: true
          events: ["RoleAssignmentCreate", "RoleAssignmentDelete", "RoleDefinitionWrite"]
        storage:
          enabled: true
          accounts: ["all"]
        nsg:
          enabled: true
          events: ["NetworkSecurityGroupRuleCreate", "NetworkSecurityGroupRuleDelete"]
    gcp:
      enabled: false

  # Secrets watchers
  secrets:
    kubernetes:
      enabled: true
      namespaces: ["all"]
    vault:
      enabled: false
    azureKeyVault:
      enabled: true
      vaultName: "my-keyvault"  # CHANGE ME

# Responders configuration
responders:
  # Auto-fix settings
  autoFix:
    enabled: true
    dryRun: false
    maxRank: "D"
    excludeNamespaces:
      - kube-system
      - kube-public
      - gp-security

  # Snapshot/rollback
  snapshot:
    enabled: true
    storage: "azblob://mystorageaccount/jsa-snapshots"  # CHANGE ME
    encryption: true
    retention:
      days: 30
      maxCount: 1000

  # JADE approval workflow
  jadeApproval:
    required: true
    timeout: 300
    fallback: "escalate"

  # Kubernetes responders
  kubernetes:
    podPatcher:
      enabled: true
      rank: "D"
    deploymentUpdater:
      enabled: true
      rank: "D"
    podIsolator:
      enabled: true
      rank: "C"
    podKiller:
      enabled: true
      rank: "C"
    namespaceIsolator:
      enabled: true
      rank: "B"

  # Policy responders
  policy:
    networkPolicyGenerator:
      enabled: true
      rank: "D"
    rbacScoper:
      enabled: true
      rank: "C"

  # Cloud responders (Azure)
  cloud:
    azure:
      nsgFixer:
        enabled: true
        rank: "D"
      storageFixer:
        enabled: true
        rank: "D"
      rbacFixer:
        enabled: true
        rank: "C"

  # Secrets responders
  secrets:
    rotator:
      enabled: true
      rank: "D"

  # Forensics
  forensics:
    logCapturer:
      enabled: true
      rank: "E"
    snapshotCreator:
      enabled: true
      rank: "E"
    evidencePreserver:
      enabled: true
      rank: "D"
      storage: "azblob://mystorageaccount/jsa-forensics"  # CHANGE ME

# Metrics and monitoring
metrics:
  prometheus:
    enabled: true
    port: 9100
    path: /metrics
    interval: 30s
  serviceMonitor:
    enabled: true
    namespace: monitoring

# Alerts
alerts:
  slack:
    enabled: true
    webhook: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"  # CHANGE ME
    channels:
      critical: "#security-critical"
      high: "#security-alerts"
      medium: "#security-log"
      info: "#security-verbose"
    mentions:
      critical: "@security-oncall"
      high: "@security-team"
  pagerduty:
    enabled: false
    integrationKey: ""

# Logging
logging:
  level: "info"
  format: "json"
  azureMonitor:
    enabled: true
    workspaceId: "00000000-0000-0000-0000-000000000000"  # CHANGE ME
    sharedKey: ""  # CHANGE ME — or use managed identity

# Service account
serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"  # CHANGE ME
  name: "jsa-infrasec"

# RBAC
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "pods/log", "events", "secrets", "configmaps"]
      verbs: ["get", "list", "watch", "patch", "delete"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets", "daemonsets"]
      verbs: ["get", "list", "watch", "patch", "update"]
    - apiGroups: ["networking.k8s.io"]
      resources: ["networkpolicies"]
      verbs: ["get", "list", "watch", "create", "patch"]
    - apiGroups: ["rbac.authorization.k8s.io"]
      resources: ["roles", "rolebindings"]
      verbs: ["get", "list", "watch", "create", "patch"]

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

# Persistence
persistence:
  enabled: true
  storageClass: "managed-premium"  # Azure managed premium SSD
  size: 10Gi

# Network policy
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: monitoring
      ports:
      - protocol: TCP
        port: 9100
  egress:
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 443  # HTTPS (Azure APIs, Slack, etc.)
      - protocol: TCP
        port: 5000  # JADE, Falco
