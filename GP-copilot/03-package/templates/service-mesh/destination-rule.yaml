# DestinationRule — Traffic Policy + mTLS Settings
#
# Controls how traffic reaches a service: load balancing, connection
# pooling, outlier detection (circuit breaking), and TLS settings.
#
# Use alongside PeerAuthentication for defense in depth:
# PeerAuthentication = "require mTLS from callers"
# DestinationRule = "use mTLS when calling this service"

---
# ── Mesh-wide: enforce mTLS for all outbound ─────────────────────────
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: mesh-wide-mtls
  namespace: istio-system
spec:
  host: "*.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL    # use Istio-managed certs for mTLS

---
# ── Template: Service with circuit breaking ───────────────────────────
# Prevents cascading failures. If a service starts failing, stop
# sending it traffic instead of overwhelming it further.
#
# apiVersion: networking.istio.io/v1
