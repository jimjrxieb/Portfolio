# OpenTelemetry Collector — DaemonSet Configuration
#
# The OTel Collector is the universal telemetry pipeline:
#   Traces from apps → Collector → Jaeger/Tempo
#   Metrics from apps → Collector → Prometheus
#   Logs from apps → Collector → Loki (optional, Fluent Bit is primary)
#
# Deploy as DaemonSet so every node has a local collector endpoint.
# Apps send traces to localhost:4317 (gRPC) or localhost:4318 (HTTP).
#
# Install:
#   kubectl apply -f templates/observability/otel-collector.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/part-of: observability

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Scrape Prometheus metrics from pods with annotations
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true

    processors:
      # Add K8s metadata to all telemetry
      k8sattributes:
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.node.name

      # Batch to reduce export overhead
      batch:
        timeout: 5s
        send_batch_size: 1024

      # Memory limiter to prevent OOM
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100

      # Tail-based sampling (keep errors + 10% of success)
      # Reduces storage cost while keeping all interesting traces
      probabilistic_sampler:
        sampling_percentage: 10

    exporters:
      # Jaeger — comment out if using Tempo
      otlp/jaeger:
        endpoint: jaeger-collector.observability:4317
        tls:
          insecure: true    # within-cluster, mTLS handles encryption

      # Tempo — uncomment if using Tempo instead of Jaeger
      # otlp/tempo:
      #   endpoint: tempo.observability:4317
      #   tls:
      #     insecure: true

      # Prometheus (for metrics collected via OTel)
      prometheus:
        endpoint: 0.0.0.0:9090
        namespace: otel

      # Debug logging (disable in production)
      # debug:
      #   verbosity: detailed

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp/jaeger]
          # exporters: [otlp/tempo]    # switch for Tempo

        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheus]

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args: ["--config=/conf/otel-collector-config.yaml"]
          ports:
            - containerPort: 4317   # OTLP gRPC
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318   # OTLP HTTP
              name: otlp-http
              protocol: TCP
            - containerPort: 9090   # Prometheus metrics
              name: metrics
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 9090
      targetPort: 9090
