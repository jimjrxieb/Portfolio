# Grafana Loki — Helm Values
#
# Loki is a log aggregation backend designed for K8s.
# Like Prometheus but for logs — label-based, not full-text indexed.
# Much cheaper storage than Elasticsearch at scale.
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm install loki grafana/loki -n logging -f loki-values.yaml
#
# Why Loki over Elasticsearch:
# - 10x cheaper storage (only indexes labels, not full text)
# - Native Grafana integration (LogQL ≈ PromQL for logs)
# - Simpler operations (no JVM tuning, no shard management)
# - Tradeoff: slower full-text search (grep-at-query-time vs pre-indexed)

# Single-binary mode (simplest — good for <100GB/day)
deploymentMode: SingleBinary

loki:
  auth_enabled: false    # single-tenant

  # Storage — filesystem for dev, S3/GCS for production
  storage:
    type: filesystem

    # === Production: S3 ===
    # type: s3
    # s3:
    #   endpoint: s3.amazonaws.com
    #   region: us-east-1
    #   bucketnames: my-loki-logs
    #   # Use IRSA for auth (no static credentials)

    # === Production: GCS ===
    # type: gcs
    # gcs:
    #   bucket_name: my-loki-logs

  # Schema config — how labels are indexed
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Limits — prevent runaway queries and ingestion
  limits_config:
    retention_period: 336h            # 14 days
    max_query_length: 721h            # 30 days max query range
    max_query_parallelism: 16
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 15MB

  # Compactor — retention enforcement
  compactor:
    retention_enabled: true
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_delete_delay: 2h
    retention_delete_worker_count: 150

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    size: 20Gi

  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001

# Monitoring
monitoring:
  serviceMonitor:
    enabled: true

# Gateway (optional — for multi-tenant or external access)
gateway:
  enabled: false

# Disable components not needed in single-binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
