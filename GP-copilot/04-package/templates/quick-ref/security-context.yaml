# Quick Reference: Complete Security Context
# Use: kubectl apply -f security-context.yaml (after filling in values)
# CKS Domains: Microservice Vulnerabilities, System Hardening
apiVersion: apps/v1
kind: Deployment
metadata:
  name: CHANGE_ME
  namespace: CHANGE_ME
spec:
  replicas: 2
  selector:
    matchLabels:
      app: CHANGE_ME
  template:
    metadata:
      labels:
        app: CHANGE_ME
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
      - name: app
        image: CHANGE_ME:TAG
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
