# ArgoCD Application — watches the manifests repo and auto-syncs to cluster
# This file gets applied once per app per environment.
#
# ArgoCD sees a change in the manifests repo (e.g. new image tag)
# → syncs the Kustomize overlay to the cluster
# → Kyverno/Gatekeeper admission control validates the manifests
# → pods roll out with zero-downtime rolling update
# → Falco watches runtime behavior
#
# You never run kubectl apply manually in production.
# ArgoCD does it for you, every time, consistently.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: APP_NAME-APP_ENV
  namespace: argocd
  labels:
    app: APP_NAME
    env: APP_ENV
    managed-by: gp-copilot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: MANIFESTS_REPO_URL
    targetRevision: HEAD
    path: overlays/APP_ENV

  destination:
    server: https://kubernetes.default.svc
    namespace: APP_NAMESPACE

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
