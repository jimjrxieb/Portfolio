apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Setting resource limits ensures that a container cannot consume more than
      the specified amount of CPU and memory. This policy validates that all
      containers have memory and CPU limits specified.
    checkov.id: CKV_K8S_13
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-memory-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Memory limits and requests are required for all containers."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                  requests:
                    memory: "?*"
    - name: validate-cpu-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "CPU limits and requests are required for all containers."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                  requests:
                    cpu: "?*"
