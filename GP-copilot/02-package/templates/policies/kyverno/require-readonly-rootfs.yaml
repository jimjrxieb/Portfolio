apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      A read-only root filesystem helps to enforce an immutable infrastructure strategy.
      This policy validates that containers have readOnlyRootFilesystem set to true.
    checkov.id: CKV_K8S_25
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-readonly-rootfs
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Root filesystem must be read-only. Set readOnlyRootFilesystem: true."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
