# Incident Response Templates for jsa-infrasec
# CKS Exam: Monitoring, Logging and Runtime Security (20%)
# Used by jsa-infrasec for automated threat response

---
# Pod isolation - remove from all services
apiVersion: v1
kind: Pod
metadata:
  name: isolated-pod
  labels:
    # Remove all app labels to disconnect from services
    quarantine: "true"
    original-app: "ORIGINAL_LABEL"
  annotations:
    jsa-infrasec.io/remediation: "incident-isolate-pod"
    jsa-infrasec.io/isolation-time: "TIMESTAMP"
    jsa-infrasec.io/isolation-reason: "REASON"

---
# NetworkPolicy to quarantine a specific pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quarantine-pod-PODNAME
  annotations:
    jsa-infrasec.io/remediation: "incident-quarantine-netpol"
    jsa-infrasec.io/target-pod: "PODNAME"
spec:
  podSelector:
    matchLabels:
      quarantine: "true"
      quarantine-id: "INCIDENT_ID"
  policyTypes:
    - Ingress
    - Egress
  # Empty = deny all traffic

---
# Namespace quarantine - isolate entire namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: namespace-quarantine
  namespace: NAMESPACE
  annotations:
    jsa-infrasec.io/remediation: "incident-namespace-quarantine"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # Allow only DNS for investigation
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53

---
# Evidence collection Job
apiVersion: batch/v1
kind: Job
metadata:
  name: evidence-collection-INCIDENT_ID
  annotations:
    jsa-infrasec.io/remediation: "incident-evidence-job"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: incident-responder
      containers:
        - name: collector
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "=== Evidence Collection for Incident INCIDENT_ID ==="
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

              echo "=== Pod Details ==="
              kubectl get pod PODNAME -n NAMESPACE -o yaml

              echo "=== Pod Logs ==="
              kubectl logs PODNAME -n NAMESPACE --all-containers --previous || true
              kubectl logs PODNAME -n NAMESPACE --all-containers

              echo "=== Pod Events ==="
              kubectl get events -n NAMESPACE --field-selector involvedObject.name=PODNAME

              echo "=== Network Policies ==="
              kubectl get networkpolicies -n NAMESPACE -o yaml

              echo "=== RBAC Bindings ==="
              kubectl get rolebindings,clusterrolebindings -A -o json | \
                jq '.items[] | select(.subjects[]?.namespace == "NAMESPACE")'

              echo "=== Evidence collection complete ==="
          resources:
            limits:
              cpu: 100m
              memory: 128Mi

---
# Deployment rollback patch
_deployment_rollback:
  description: "Rollback deployment to previous revision"
  command: |
    kubectl rollout undo deployment/DEPLOYMENT -n NAMESPACE
    kubectl rollout status deployment/DEPLOYMENT -n NAMESPACE --timeout=5m

---
# Pod kill and prevent restart
_pod_kill_prevent_restart:
  description: "Kill pod and scale deployment to 0"
  steps:
    - command: kubectl delete pod PODNAME -n NAMESPACE --grace-period=0 --force
    - command: kubectl scale deployment DEPLOYMENT -n NAMESPACE --replicas=0
    - command: kubectl annotate deployment DEPLOYMENT -n NAMESPACE jsa-infrasec.io/suspended="INCIDENT_ID"

---
# Secret rotation steps
_secret_rotation:
  description: "Rotate compromised secrets"
  steps:
    - name: "Create new secret"
      command: |
        kubectl create secret generic NEW_SECRET_NAME \
          --from-literal=key=NEW_VALUE \
          -n NAMESPACE

    - name: "Update deployment to use new secret"
      command: |
        kubectl patch deployment DEPLOYMENT -n NAMESPACE \
          --type=json \
          -p='[{"op":"replace","path":"/spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name","value":"NEW_SECRET_NAME"}]'

    - name: "Delete old secret"
      command: |
        kubectl delete secret OLD_SECRET_NAME -n NAMESPACE

    - name: "Restart pods"
      command: |
        kubectl rollout restart deployment/DEPLOYMENT -n NAMESPACE

---
# Forensic snapshot before remediation
_forensic_snapshot:
  description: "Capture pod state before any remediation"
  commands:
    pod_yaml: kubectl get pod PODNAME -n NAMESPACE -o yaml > /evidence/pod-PODNAME.yaml
    pod_describe: kubectl describe pod PODNAME -n NAMESPACE > /evidence/pod-PODNAME-describe.txt
    pod_logs: kubectl logs PODNAME -n NAMESPACE --all-containers > /evidence/pod-PODNAME-logs.txt
    pod_events: kubectl get events -n NAMESPACE --field-selector involvedObject.name=PODNAME > /evidence/pod-PODNAME-events.txt
    container_exec: |
      kubectl exec PODNAME -n NAMESPACE -- sh -c '
        echo "=== Process List ===" && ps aux
        echo "=== Network Connections ===" && netstat -tunlp 2>/dev/null || ss -tunlp
        echo "=== Open Files ===" && ls -la /proc/1/fd 2>/dev/null || true
        echo "=== Environment ===" && env
        echo "=== Filesystem ===" && df -h
      ' > /evidence/pod-PODNAME-runtime.txt

---
# Incident response runbook
_runbook:
  name: "Container Compromise Response"
  trigger: "Falco alert for suspicious activity"
  steps:
    1_isolate:
      action: "Isolate pod from network"
      automated: true
      rank: "D"
      template: "quarantine-pod-PODNAME"

    2_snapshot:
      action: "Capture forensic evidence"
      automated: true
      rank: "D"
      template: "_forensic_snapshot"

    3_analyze:
      action: "Analyze attack vector"
      automated: false
      rank: "C"
      requires: "JADE approval"

    4_contain:
      action: "Scale down compromised deployment"
      automated: false
      rank: "C"
      requires: "JADE approval"

    5_eradicate:
      action: "Remove malicious artifacts"
      automated: false
      rank: "B"
      requires: "Human approval"

    6_recover:
      action: "Restore from known good state"
      automated: false
      rank: "B"
      requires: "Human approval"

    7_postmortem:
      action: "Document lessons learned"
      automated: false
      rank: "C"

---
# PodDisruptionBudget bypass for incidents
_pdb_bypass:
  description: "Temporarily remove PDB for incident response"
  pre_check: |
    kubectl get pdb -n NAMESPACE -o name | xargs -I{} kubectl annotate {} jsa-infrasec.io/original-minAvailable="$(kubectl get {} -n NAMESPACE -o jsonpath='{.spec.minAvailable}')"

  bypass: |
    kubectl patch pdb PDB_NAME -n NAMESPACE --type=merge -p '{"spec":{"minAvailable":0}}'

  restore: |
    ORIGINAL=$(kubectl get pdb PDB_NAME -n NAMESPACE -o jsonpath='{.metadata.annotations.jsa-infrasec\.io/original-minAvailable}')
    kubectl patch pdb PDB_NAME -n NAMESPACE --type=merge -p "{\"spec\":{\"minAvailable\":$ORIGINAL}}"
