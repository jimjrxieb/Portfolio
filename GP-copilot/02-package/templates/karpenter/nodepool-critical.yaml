# =============================================================================
# Ghost Protocol -- Karpenter Critical NodePool
# On-demand ONLY — no Spot interruptions for critical services
#
# Usage: Pin critical services with node affinity:
#   affinity:
#     nodeAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         nodeSelectorTerms:
#           - matchExpressions:
#               - key: karpenter.sh/nodepool
#                 operator: In
#                 values: ["critical"]
# =============================================================================
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: critical
  labels:
    app.kubernetes.io/managed-by: gp-copilot
spec:
  template:
    metadata:
      labels:
        managed-by: karpenter
        nodepool: critical
        workload-type: critical
    spec:
      requirements:
        # General purpose only — predictable performance
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m5", "m6i", "m7i"]

        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge", "2xlarge"]

        # ON-DEMAND ONLY — no Spot interruptions for critical workloads
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      expireAfter: 168h

  disruption:
    # Less aggressive — only consolidate when empty
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s

  budgets:
    # Conservative — only 1 node at a time
    - nodes: "1"

  limits:
    cpu: "32"
    memory: 128Gi

  # Highest weight = lowest priority (only used when explicitly requested)
  weight: 10
