# gateway-class.yaml — GatewayClass definitions (one per controller)
# NIST 800-53: SC-7 (Boundary Protection)
#
# Cluster-scoped. Infra team owns this. Apply ONCE per cluster.
# Uncomment the controller you're using.
# ─────────────────────────────────────────────────────────────────

---
# Envoy Gateway (recommended — lightweight, Gateway API-native)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: gp-gateway
  labels:
    app.kubernetes.io/managed-by: gp-copilot
    control: SC-7
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller

