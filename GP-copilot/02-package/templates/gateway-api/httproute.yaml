# httproute.yaml — Standard HTTPRoute for API + UI backends
# NIST 800-53: SC-7 (Boundary Protection)
#
# App team owns HTTPRoutes. They define path-based routing to their services.
# Platform team owns the Gateway — app team can't change TLS, ports, or listeners.
#
# Replace: <APP_NAME>, <NAMESPACE>, <API_SERVICE>, <API_PORT>, <UI_SERVICE>, <UI_PORT>
# ─────────────────────────────────────────────────────────────────

---
# HTTP → HTTPS redirect (attach to the http-redirect listener)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: <APP_NAME>-https-redirect
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/managed-by: gp-copilot
    control: SC-8
spec:
  parentRefs:
    - name: <APP_NAME>-gateway
      sectionName: http-redirect
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# API backend (/api/*)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: <APP_NAME>-api
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/managed-by: gp-copilot
    control: SC-7
spec:
  parentRefs:
    - name: <APP_NAME>-gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: <API_SERVICE>
          port: <API_PORT>

---
# UI / frontend (catch-all /)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: <APP_NAME>-ui
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/managed-by: gp-copilot
    control: SC-7
spec:
  parentRefs:
    - name: <APP_NAME>-gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: <UI_SERVICE>
          port: <UI_PORT>
